services:
  neo4j:
    image: neo4j:5-community
    container_name: industrial-ki-neo4j
    ports:
      - "7474:7474" # browser UI
      - "7687:7687" # bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: industrial-ki-backend
    env_file: .env
    environment:
      # Reach Neo4j by its compose service name, not localhost.
      - NEO4J_URI=bolt://neo4j:7687
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Where the browser reaches the backend (host), not the internal name.
        VITE_API_BASE_URL: http://localhost:8000
    container_name: industrial-ki-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neo4j_data:

# Chroma runs embedded (no container) — see backend/requirements.txt (chromadb) and
# CHROMA_PATH in .env. `chromadb.PersistentClient(path=CHROMA_PATH)` writes straight
# to a local directory, so there's no server to stand up for the hackathon scope.
